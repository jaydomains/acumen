name: frontend

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install deps (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Codegen drift check
        # Regenerates the OpenAPI types from the committed schema
        # snapshot and asserts the result matches the committed
        # `src/types/api.d.ts`. AC-CD19: schema snapshot is the
        # offline source of truth; live regeneration is the explicit
        # opt-in via `pnpm codegen:live`.
        run: pnpm codegen:check
      - name: ESLint
        run: pnpm lint
      - name: Prettier
        run: pnpm format:check
      - name: TypeScript
        run: pnpm typecheck
      - name: Vitest
        run: pnpm test --run
      - name: Next.js build (no NEXT_PUBLIC_* injected)
        # Runtime config (backend URL etc.) is fetched at boot via
        # /api/config — so `pnpm build` must succeed without any
        # NEXT_PUBLIC_API_BASE_URL in the env. This step catches any
        # future regression that re-introduces a module-load read of
        # build-time env (AC-CD19).
        run: pnpm build

  docker-build:
    # Faithful reproduction of the production image build: no
    # NEXT_PUBLIC_* envs are passed. Slower than the `checks` job's
    # `pnpm build` but exercises the full Dockerfile (deps → builder
    # → runner stages) so Dockerfile-specific regressions are caught.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build frontend Docker image
        run: docker build -f frontend/Dockerfile frontend/

  e2e:
    # Playwright E2E (FE-4 slice 3). Gated on `checks` passing — no
    # point spinning a browser if Vitest is red. Single Chromium
    # project at v1 to keep CI minutes minimal; the
    # `playwright.config.ts` retries flakes once in CI and uploads
    # the HTML report on failure.
    #
    # Skip on `[skip e2e]` marker so emergency hotfixes don't block
    # on the slower E2E layer. `head_commit.message` is only
    # populated for `push` events — on `pull_request` events the
    # marker must come from the PR title instead. Check both so the
    # escape hatch works whichever trigger fired the run. (Per
    # Gitar review.)
    needs: checks
    if: |
      !contains(github.event.head_commit.message || '', '[skip e2e]') &&
      !contains(github.event.pull_request.title || '', '[skip e2e]')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install deps (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
      - name: Install Playwright Chromium + system deps
        run: pnpm e2e:install
      - name: Playwright E2E
        run: pnpm e2e
      - name: Upload HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
